  /v1/poker/next-actions:
    get:
      operationId: getPreflopNextActions
      tags: [Navigation]
      summary: Get available preflop actions at the next decision node
      description: |
        Lightweight endpoint returning available actions at the next preflop node.
        No strategy arrays or EVs — just action metadata and game state.

        Called when the user clicks an action to navigate forward in the preflop tree.

        Unlike postflop, `future_actions` is always empty for preflop nodes
        (no street transitions occur within the preflop tree).
      parameters:
        - $ref: '#/components/parameters/gametype'
        - $ref: '#/components/parameters/depth'
        - $ref: '#/components/parameters/stacks'
        - $ref: '#/components/parameters/preflop_actions'
      responses:
        '200':
          description: Available actions at the next preflop node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreflopNextActionsResponse'
              example:
                next_actions:
                  game:
